name: build_cuda

on:
  workflow_dispatch:
  push:
    branches: [cuda]

jobs:
  windows-cuda-x64:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup CUDA
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '12.2.0'
          use-github-cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build CUDA extract (Windows x64)
        shell: cmd
        run: |
          nvcc -O3 -DFP_TYPE=float -I include -o build\cllsm2_extract_cuda.exe cllsm2_extract_cuda.cu -lcufft -lcudart

      - name: Show binary info
        run: |
          if (Test-Path "build\cllsm2_extract_cuda.exe") {
            $f = Get-Item "build\cllsm2_extract_cuda.exe"
            Write-Output "Size: $($f.Length / 1KB) KB"
          } else {
            Write-Output "ERROR: binary not found"
            exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: cllsm2_extract_cuda-win-x64
          path: build\cllsm2_extract_cuda.exe
