name: build_cuda

on:
  workflow_dispatch:
  push:
    branches: [cuda]

jobs:
  windows-cuda-x64:
    runs-on: windows-2022
    
    steps:
      - uses: actions/checkout@v4

      # ========== 1. 缓存 Conda 包（加速核心）==========
      - name: Cache Conda Packages
        uses: actions/cache@v4
        with:
          path: ~/conda_pkgs_dir
          key: conda-win-cuda128-msvc2022-v3
          restore-keys: |
            conda-win-cuda128-msvc2022-

      # ========== 2. 初始化 Conda 环境 ==========
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          python-version: "3.10"
          activate-environment: cuda_dev
          channels: nvidia/label/cuda-12.8.0,conda-forge,defaults
          channel-priority: strict
          use-only-tar-bz2: false

      # ========== 3. 安装 CUDA 12.8 + MSVC ==========
      - name: Install CUDA 12.8 & MSVC
        shell: pwsh
        run: |
          # 安装 CUDA 工具包 (Windows下cufft已包含在cuda-libraries-dev中)
          conda install -y -c nvidia/label/cuda-12.8.0 `
            cuda-nvcc=12.8 `
            cuda-cudart-dev=12.8 `
            cuda-libraries-dev=12.8

          # 安装 MSVC 编译器
          conda install -y -c conda-forge vs2022_win-64
        env:
          CONDA_SOLVER: libmamba

      # ========== 4. 激活 MSVC 并编译（多架构）==========
      - name: Build CUDA extract (Windows x64)
        shell: pwsh
        run: |
          # 1. 显式查找并激活 MSVC 环境变量
          $activateScript = "$env:CONDA_PREFIX\etc\conda\activate.d\activate_vs2022.bat"
          
          if (-not (Test-Path $activateScript)) {
            # 备用路径搜索
            $activateScript = Get-ChildItem -Path "$env:CONDA_PREFIX\etc\conda\activate.d\" -Filter "*vs*.bat" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }

          if (Test-Path $activateScript) {
            Write-Host "Activating MSVC via: $activateScript"
            # 在 cmd 中执行 bat 脚本，捕获所有环境变量并注入到当前 PowerShell 进程
            cmd /c "`"$activateScript`" && set" | ForEach-Object {
              if ($_ -match "^(.+?)=(.*)$") {
                [System.Environment]::SetEnvironmentVariable($matches[1], $matches[2], "Process")
              }
            }
          } else {
            Write-Warning "MSVC activate script not found in Conda env. Falling back to system VS..."
            # 回退方案：使用 windows-2022 runner 自带的系统级 VS2022
            $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
            if (Test-Path $vsWhere) {
              $vsPath = & $vsWhere -latest -property installationPath
              cmd /c "`"$vsPath\Common7\Tools\VsDevCmd.bat`" -arch=amd64 && set" | ForEach-Object {
                if ($_ -match "^(.+?)=(.*)$") {
                  [System.Environment]::SetEnvironmentVariable($matches[1], $matches[2], "Process")
                }
              }
            } else {
              Write-Error "No MSVC compiler found!"
              exit 1
            }
          }

          # 2. 验证编译器
          Write-Host "Checking compilers..."
          nvcc --version
          cl 2>&1 | Select-Object -First 1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "cl.exe is still not available after activation!"
            exit 1
          }

          # 3. 创建输出目录并编译
          New-Item -ItemType Directory -Force -Path build | Out-Null

          # 多架构编译：覆盖 T4(sm_75) / 30系(sm_86) / 40系(sm_89) / 50系(sm_120)
          nvcc -O3 -DFP_TYPE=float `
            -gencode arch=compute_75,code=sm_75 `
            -gencode arch=compute_86,code=sm_86 `
            -gencode arch=compute_89,code=sm_89 `
            -gencode arch=compute_120,code=sm_120 `
            -I include `
            -o build\cllsm2_extract_cuda.exe `
            cllsm2_extract_cuda.cu `
            -lcufft -lcudart

      # ========== 5. 验证产物 ==========
      - name: Show binary info
        shell: pwsh
        run: |
          if (Test-Path "build\cllsm2_extract_cuda.exe") {
            $f = Get-Item "build\cllsm2_extract_cuda.exe"
            Write-Output "Size: $([math]::Round($f.Length / 1KB, 2)) KB"
          } else {
            Write-Output "ERROR: binary not found"
            exit 1
          }

      # ========== 6. 上传构建产物 ==========
      - uses: actions/upload-artifact@v4
        with:
          name: cllsm2_extract_cuda-win-x64
          path: build\cllsm2_extract_cuda.exe
