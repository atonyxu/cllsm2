name: build_cuda

on:
  workflow_dispatch:
  push:
    branches: [cuda]

jobs:
  windows-cuda-x64:
    runs-on: windows-2022
    
    steps:
      - uses: actions/checkout@v4

      # ========== 1. 缓存 Conda 包 ==========
      - name: Cache Conda Packages
        uses: actions/cache@v4
        with:
          path: ~/conda_pkgs_dir
          key: conda-win-cuda128-v4
          restore-keys: |
            conda-win-cuda128-

      # ========== 2. 初始化 Conda 环境 ==========
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          python-version: "3.10"
          activate-environment: cuda_dev
          channels: nvidia/label/cuda-12.8.0,conda-forge,defaults
          channel-priority: strict
          use-only-tar-bz2: false

      # ========== 3. 仅安装 CUDA 12.8 (不再通过 Conda 安装 MSVC) ==========
      - name: Install CUDA 12.8 Toolkit
        shell: pwsh
        run: |
          conda install -y -c nvidia/label/cuda-12.8.0 `
            cuda-nvcc=12.8 `
            cuda-cudart-dev=12.8 `
            cuda-libraries-dev=12.8
        env:
          CONDA_SOLVER: libmamba

      # ========== 4. 使用系统原生 VS2022 编译（多架构）==========
      - name: Build CUDA extract (Windows x64)
        shell: pwsh
        run: |
          # 1. 激活 windows-2022 Runner 原生自带的 VS2022
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vsWhere)) {
            Write-Error "vswhere.exe not found! Runner may not have VS installed."
            exit 1
          }
          
          $vsInstallPath = & $vsWhere -latest -property installationPath
          Write-Host "Found VS2022 at: $vsInstallPath"
          
          # 执行 VsDevCmd.bat 并将环境变量注入当前 PowerShell 进程
          cmd /c "`"$vsInstallPath\Common7\Tools\VsDevCmd.bat`" -arch=amd64 && set" | ForEach-Object {
            if ($_ -match "^([^=]+)=(.*)$") {
              [System.Environment]::SetEnvironmentVariable($matches[1], $matches[2], "Process")
            }
          }

          # 2. 验证编译器
          Write-Host "Checking compilers..."
          nvcc --version
          cl 2>&1 | Select-Object -First 1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "cl.exe is not available!"
            exit 1
          }

          # 3. 创建输出目录并编译
          New-Item -ItemType Directory -Force -Path build | Out-Null

          # 多架构编译：T4(sm_75) / 30系(sm_86) / 40系(sm_89) / 50系(sm_120)
          nvcc -O3 -DFP_TYPE=float `
            --compiler-options=/TC `
            -gencode arch=compute_75,code=sm_75 `
            -gencode arch=compute_86,code=sm_86 `
            -gencode arch=compute_89,code=sm_89 `
            -gencode arch=compute_120,code=sm_120 `
            -I include `
            -o build\cllsm2_extract_cuda.exe `
            cllsm2_extract_cuda.cu `
            -lcufft -lcudart

      # ========== 5. 验证产物 ==========
      - name: Show binary info
        shell: pwsh
        run: |
          if (Test-Path "build\cllsm2_extract_cuda.exe") {
            $f = Get-Item "build\cllsm2_extract_cuda.exe"
            Write-Output "Size: $([math]::Round($f.Length / 1KB, 2)) KB"
          } else {
            Write-Output "ERROR: binary not found"
            exit 1
          }

      # ========== 6. 上传构建产物 ==========
      - uses: actions/upload-artifact@v4
        with:
          name: cllsm2_extract_cuda-win-x64
          path: build\cllsm2_extract_cuda.exe
